<main class="all">
  <div class="d-flex justify-content-center align-items-center min-vh-100 px-3">
    <div class="page-card">
      <div class="m-auto w-100 p-2">

        <form (ngSubmit)="onLogin()" #loginForm="ngForm">

          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              id="userEmail"
              name="email"
              placeholder="name@example.com"
              [(ngModel)]="email"
              required
            >
            <label for="userEmail">Email address</label>
          </div>

          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              id="userPassword"
              name="password"
              placeholder="Password"
              [(ngModel)]="password"
              required
            >
            <label for="userPassword">Password</label>
          </div>

          <div class="d-flex justify-content-end">
            <a routerLink="/forget_pass" class="text-decoration-none">
              Forgot Password?
            </a>
          </div>

          <button
            type="submit"
            class="btn btn-outline-success w-100 mt-3 mb-3"
            [disabled]="isLoading"
          >
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>

          <div *ngIf="errorMessage" class="text-danger text-center mb-2">
            {{ errorMessage }}
          </div>

        </form>

        <div class="text-center">
          <span class="text-white">
            Don't have an account?
            <a routerLink="/register" class="text-decoration-none">Register</a>
          </span>
        </div>

      </div>
    </div>
  </div>
</main>
